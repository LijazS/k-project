apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: flipkart-route
  namespace: k-ns
spec:
  parentRefs:
    - name: my-gateway
      namespace: k-ns
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /      
      backendRefs:
        - name: flipkart-service    
          port: 80