apiVersion: apps/v1
kind: Deployment
metadata: 
  name: flipkart-deployment
  namespace: k-ns
labels:
  app: flipkart-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flipkart-app
  template:
    metadata:
    labels:
      app: flipkart-app
    spec:
      containers:
      - name: flipkart-container
        image: muralisocial123/flipkart-clone-kuberox:v1.1.0
        ports:
        - containerPort: 80

  
