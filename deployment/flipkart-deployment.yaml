apiVersion: apps/v1
kind: Deployment
metadata: 
  name: flipkart-deployment
  namespace: k-ns
  labels:
    app: flipkart-app
spec:
  strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 1
  replicas: 1
  selector:
    matchLabels:
      app: flipkart-app
  template:
    metadata:
      labels:
        app: flipkart-app
    spec:
      containers:
      - name: flipkart-container
        image: muralisocial123/flipkart-clone-kuberox:v1.1.0
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 80

  
